name: adam_asmaca
description: Multiplayer Adam Asmaca oyunu - Flutter ile kelime tahmin oyunu

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # HTTP for TDK API
  http: ^1.1.2

  # Utils
  uuid: ^4.2.2

  # WebSocket
  web_socket_channel: ^3.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
